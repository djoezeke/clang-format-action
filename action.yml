name: clang-format-action
description: Run clang-format diagnostics, optionally apply fixes, and publish review feedback on pull requests.
author: Sackey Ezekiel Etrue

inputs:
  github_token:
    description: Token used to push the fix branch and create or update a pull request.
    required: true
  clang_format_path:
    description: Path to the clang-format executable.
    required: false
    default: clang-format
  source_extensions:
    description: Comma-separated list of source file extensions to analyze.
    required: false
    default: .c,.cc,.cpp,.cxx,.m,.mm,.h,.hh,.hpp,.hxx
  exclude_paths:
    description: Comma-separated list of path fragments to ignore.
    required: false
    default: .git
  format_file:
    description: Apply clang-format fixes in place (`-i`) for each analyzed file.
    required: false
    default: "true"
  create_pull_request:
    description: Create or update a pull request when formatting changes were applied.
    required: false
    default: "true"
  base_branch:
    description: Base branch for the pull request. Defaults to the repository default branch.
    required: false
    default: ""
  branch_prefix:
    description: Prefix for the generated fix branch.
    required: false
    default: clang-format/auto-fix
  commit_message:
    description: Commit message used when fixes are committed.
    required: false
    default: "chore: apply clang-format fixes"
  pr_title:
    description: Title for the pull request.
    required: false
    default: Apply clang-format fixes
  pr_body:
    description: Optional extra text appended to the generated pull request body.
    required: false
    default: ""
  thread_comments:
    description: Leave an issue-thread report comment on the pull request. Options `update`, `create`, or `off`.
    required: false
    default: "update"
  analysis_scope:
    description: Scope of analysis. Use 'all' for all tracked files or 'changed' for files changed in the PR.
    required: false
    default: "all"
  format_review:
    description: Create a pull request review when clang-format diagnostics are found.
    required: false
    default: "true"
  review_event:
    description: Review event for pull request reviews. Options `comment` or `request_changes`.
    required: false
    default: "comment"
  file_annotations:
    description: Create GitHub file annotations for reported diagnostics.
    required: false
    default: "true"
  fail_on_diagnostics:
    description: Legacy fail policy. When true, fail if any diagnostics are found.
    required: false
    default: "false"
  max_comments:
    description: Maximum inline review comments to post (0 = unlimited).
    required: false
    default: "0"
  suppress_warnings:
    description: Suppress clang-format warning-level diagnostics.
    required: false
    default: "false"
  max_diagnostics:
    description: Maximum diagnostics included in review/annotation/report surfaces (0 = unlimited).
    required: false
    default: "0"
  fail_on:
    description: Failure policy. Options `none`, `error`, or `all`.
    required: false
    default: "none"

outputs:
  changed:
    description: Whether files were modified.
  diagnostics:
    description: Number of clang-format diagnostics collected.
  diagnostics_reported:
    description: Number of diagnostics included in report/review output after limits and suppression.
  diagnostics_warnings:
    description: Number of warning-level diagnostics.
  diagnostics_errors:
    description: Number of error-level diagnostics.
  branch:
    description: Name of the generated branch.
  pull_request_url:
    description: URL of the created or updated pull request.
  review_id:
    description: ID of the created PR review.
  report_path:
    description: Path to the generated markdown report.

runs:
  using: node20
  main: dist/index.js

branding:
  icon: check-circle
  color: blue
